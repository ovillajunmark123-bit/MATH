<!DOCTYPE html>
<html>
<head>
  <title>Math Hub - Videos & Tools</title>
  <style>
    body { background:#f9f9ff; font-family:Arial; color:#003366; padding:20px; }
    h1 { text-align:center; color:#0066cc; }
    #searchBox { width:80%; padding:10px; margin:20px auto; display:block; border:2px solid #0066cc; border-radius:5px; }
    .video-container { margin:20px auto; max-width:700px; text-align:center; border:1px solid #0066cc; border-radius:5px; background:#eef6ff; padding:15px; }
    iframe { width:100%; height:400px; border:none; border-radius:5px; }
    button { background:#0066cc; color:white; border:none; padding:10px 20px; margin:20px auto; display:block; border-radius:5px; }
    button:hover { background:#004c99; }
  </style>
</head>
<body>
  <h1>Math Videos & Tools</h1>
  <input type="text" id="searchBox" placeholder="Search for a math topic...">
  <div id="videoList">
    <div class="video-container"><iframe src="https://www.youtube.com/embed/HEfHFsfGXjs" allowfullscreen></iframe><p>Introduction to Algebra.</p></div>
    <div class="video-container"><iframe src="https://www.youtube.com/embed/2eb0zJ9lWJs" allowfullscreen></iframe><p>College Algebra – Functions and graphs.</p></div>
    <div class="video-container"><iframe src="https://www.youtube.com/embed/2JH6sG5n4nE" allowfullscreen></iframe><p>Calculus Basics – Limits and derivatives.</p></div>
    <div class="video-container"><iframe src="https://www.youtube.com/embed/5z8w2Jz3pGU" allowfullscreen></iframe><p>Statistics for Beginners.</p></div>
  </div>
  <h2 style="text-align:center; color:#0066cc;">High-Function Calculator</h2>
  <div class="video-container"><iframe src="https://www.desmos.com/scientific" width="600" height="400"></iframe><p>Advanced calculator for equations and graphs.</p></div>
  <button onclick="window.location.href='fourthpage.html'">Next</button>
  <script>
    document.getElementById('searchBox').addEventListener('keyup', function() {
      let filter = this.value.toLowerCase();
      document.querySelectorAll('#videoList .video-container').forEach(function(item) {
        item.style.display = item.textContent.toLowerCase().includes(filter) ? "" : "none";
      });
    });
  </script>
</body>
</html>
